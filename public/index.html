<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Data Tool</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
          <div>
            <h1>Data Tool</h1>
          </div>
        <div class="topbar-actions">
          <button class="ghost-button" id="clearButton" type="button">
            <i data-lucide="rotate-ccw"></i>
            Reset
          </button>
          <button class="primary-button" id="runButton" type="button">
            <i data-lucide="scan-search"></i>
            Run
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="input-panel" aria-label="Inputs">
          <div class="panel-heading">
            <div>
              <h2>Input</h2>
            </div>
          </div>

          <div class="mode-switch" role="tablist" aria-label="Collector modes">
            <button class="mode-button active" type="button" data-mode="web">Get Pages</button>
            <button class="mode-button" type="button" data-mode="osint">Find Info</button>
            <button class="mode-button" type="button" data-mode="transcript">YouTube</button>
          </div>



          <div class="mode-panel" id="webGrabPanel">
            <label class="field-label" for="webInput">Website Links</label>
            <textarea id="webInput" class="field-control text-area" spellcheck="false" placeholder="https://example.com&#10;https://github.com/example"></textarea>
          </div>

          <div class="mode-panel hidden" id="osintPanel">
            <label class="field-label" for="rawInput">Names, Links, or Text</label>
            <textarea id="rawInput" class="field-control text-area" spellcheck="false" placeholder="@username&#10;https://instagram.com/name&#10;Paste any text to search"></textarea>

            <div class="drop-zone" id="dropZone">
              <input id="imageInput" type="file" accept="image/*">
              <div class="drop-zone-content">
                <strong>Drop a photo here or click to browse</strong>
                <span id="imageFileName" style="font-size:12px;color:#666"></span>
              </div>
              <div class="drop-zone-buttons" id="imageActions" style="display:none">
                <button class="ghost-button compact" id="ocrButton" type="button">
                  <i data-lucide="image"></i>
                  OCR
                </button>
                <button class="ghost-button compact" id="imageSearchButton" type="button">
                  <i data-lucide="search"></i>
                  Image Search
                </button>
                <button class="ghost-button compact" id="faceSearchButton" type="button">
                  <i data-lucide="external-link"></i>
                  Face Search
                </button>
              </div>
            </div>

            <div class="image-preview-wrap hidden" id="previewWrap">
              <img id="imagePreview" alt="Uploaded screenshot preview">
            </div>
          </div>

          <div class="mode-panel hidden" id="transcriptPanel">
            <label class="field-label" for="transcriptInput">YouTube Link</label>
            <textarea id="transcriptInput" class="field-control text-area" spellcheck="false" placeholder="https://www.youtube.com/watch?v=VIDEO_ID" style="min-height:60px"></textarea>
          </div>

          <div class="status-box" id="statusBox">Ready.</div>
        </section>

        <section class="results-panel" aria-label="Results">
          <div class="tabs" role="tablist" aria-label="Result views">
            <button class="tab-button active" type="button" data-tab="summary">Overview</button>
            <button class="tab-button" type="button" data-tab="findings">Results</button>
            <button class="tab-button" type="button" data-tab="sources">Links</button>
            <button class="tab-button" type="button" data-tab="report">Report</button>
            <button class="tab-button" type="button" data-tab="transcript">Transcript</button>
          </div>

          <div class="tab-panel active" id="summaryTab">
            <div class="summary-grid">
              <article class="metric">
                <span id="metricTargets">0</span>
                <p>Results</p>
              </article>
              <article class="metric">
                <span id="metricSources">0</span>
                <p>Links</p>
              </article>
              <article class="metric">
                <span id="metricFlags">0</span>
                <p>Alerts</p>
              </article>
            </div>
            <div class="analyst-card">
              <h2>Summary</h2>
              <p id="summaryText">Paste something above and click Run to start.</p>
            </div>
            <div class="section-heading">
              <h2>Alerts</h2>
            </div>
            <div class="flag-list" id="flagList"></div>
          </div>

          <div class="tab-panel" id="findingsTab">
            <div class="section-heading">
              <h2>Results</h2>
              <button class="ghost-button compact" id="copyJsonButton" type="button">
                <i data-lucide="copy"></i>
                Data
              </button>
            </div>
            <div class="finding-list" id="findingList"></div>
          </div>

          <div class="tab-panel" id="sourcesTab">
            <div class="section-heading">
              <h2>Links</h2>
              <button class="ghost-button compact" id="openAllButton" type="button">
                <i data-lucide="external-link"></i>
                Open All
              </button>
            </div>
            <div class="source-list" id="sourceList"></div>
          </div>

          <div class="tab-panel" id="reportTab">
            <div class="section-heading">
              <h2>Report</h2>
              <button class="ghost-button compact" id="copyReportButton" type="button">
                <i data-lucide="clipboard"></i>
                Copy
              </button>
            </div>
            <textarea id="reportOutput" class="report-output" readonly></textarea>
          </div>

          <div class="tab-panel" id="transcriptTab">
            <div class="section-heading">
              <h2>Transcript</h2>
              <button class="ghost-button compact" id="copyTranscriptButton" type="button">
                <i data-lucide="clipboard"></i>
                Copy
              </button>
            </div>
            <div id="transcriptContent"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
